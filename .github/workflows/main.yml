name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[dev]"
      - name: Lint
        run: |
          . .venv/bin/activate
          ruff check .
      - name: Type check
        run: |
          . .venv/bin/activate
          mypy bot/ --strict
      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest tests/ --asyncio-mode=auto --cov=bot --cov-report=term-missing
      - name: Check for hardcoded secrets
        run: |
          ! grep -r --include='*.py' 'BOT_TOKEN\|API_KEY\|SECRET\|MONGO_URI' bot/ || (echo 'Hardcoded secret found!' && exit 1)
