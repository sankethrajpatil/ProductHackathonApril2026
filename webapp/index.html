<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SplitBot Dashboard</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
  <style>
    /* ------------------------------------------------------------------ */
    /* Base reset & Telegram theme integration                            */
    /* ------------------------------------------------------------------ */
    :root {
      --tg-bg:        var(--tg-theme-bg-color, #ffffff);
      --tg-text:      var(--tg-theme-text-color, #000000);
      --tg-hint:      var(--tg-theme-hint-color, #999999);
      --tg-link:      var(--tg-theme-link-color, #2678b6);
      --tg-btn:       var(--tg-theme-button-color, #3390ec);
      --tg-btn-text:  var(--tg-theme-button-text-color, #ffffff);
      --tg-secondary: var(--tg-theme-secondary-bg-color, #f0f0f0);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--tg-bg);
      color: var(--tg-text);
      padding: 0 16px 24px;
      -webkit-font-smoothing: antialiased;
    }

    /* ------------------------------------------------------------------ */
    /* Tab navigation                                                     */
    /* ------------------------------------------------------------------ */
    .tabs {
      display: flex;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--tg-bg);
      border-bottom: 1px solid var(--tg-hint);
      margin: 0 -16px;
      padding: 0 16px;
    }
    .tab {
      flex: 1;
      padding: 14px 0;
      text-align: center;
      font-weight: 600;
      font-size: 14px;
      color: var(--tg-hint);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
      user-select: none;
    }
    .tab.active {
      color: var(--tg-btn);
      border-bottom-color: var(--tg-btn);
    }

    /* ------------------------------------------------------------------ */
    /* Content panels                                                     */
    /* ------------------------------------------------------------------ */
    .panel { display: none; padding-top: 16px; }
    .panel.active { display: block; }

    /* ------------------------------------------------------------------ */
    /* Section headers                                                    */
    /* ------------------------------------------------------------------ */
    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--tg-hint);
      margin-bottom: 10px;
    }

    /* ------------------------------------------------------------------ */
    /* Balance cards                                                      */
    /* ------------------------------------------------------------------ */
    .balance-card {
      background: var(--tg-secondary);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .balance-card .name { font-weight: 600; font-size: 15px; }
    .balance-card .amount { font-weight: 700; font-size: 15px; }
    .balance-card .amount.positive { color: #34c759; }
    .balance-card .amount.negative { color: #ff3b30; }

    /* ------------------------------------------------------------------ */
    /* Settlement cards                                                   */
    /* ------------------------------------------------------------------ */
    .settlement-card {
      background: var(--tg-secondary);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .settlement-card .arrow {
      font-size: 18px;
      color: var(--tg-btn);
      flex-shrink: 0;
    }
    .settlement-card .details { flex: 1; }
    .settlement-card .details .names { font-weight: 600; font-size: 14px; }
    .settlement-card .details .amt { color: var(--tg-hint); font-size: 13px; margin-top: 2px; }

    /* ------------------------------------------------------------------ */
    /* Expense list                                                       */
    /* ------------------------------------------------------------------ */
    .expense-item {
      background: var(--tg-secondary);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
    }
    .expense-item .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .expense-item .desc { font-weight: 600; font-size: 15px; }
    .expense-item .amt { font-weight: 700; font-size: 15px; color: var(--tg-link); }
    .expense-item .meta {
      margin-top: 4px;
      font-size: 12px;
      color: var(--tg-hint);
    }
    .expense-item.settlement {
      border-left: 3px solid #34c759;
    }

    /* ------------------------------------------------------------------ */
    /* Empty / loading / error states                                     */
    /* ------------------------------------------------------------------ */
    .state-msg {
      text-align: center;
      padding: 48px 16px;
      color: var(--tg-hint);
      font-size: 15px;
    }
    .state-msg .icon { font-size: 36px; margin-bottom: 12px; }
    .loader {
      width: 32px; height: 32px;
      border: 3px solid var(--tg-secondary);
      border-top-color: var(--tg-btn);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 48px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ------------------------------------------------------------------ */
    /* TON Connect & Wallet                                               */
    /* ------------------------------------------------------------------ */
    .wallet-bar {
      background: var(--tg-secondary);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .wallet-bar .wallet-info {
      font-size: 13px;
      color: var(--tg-hint);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .wallet-bar .wallet-addr {
      font-family: monospace;
      font-size: 12px;
      color: var(--tg-text);
    }
    .btn {
      display: inline-block;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: opacity .2s;
      user-select: none;
    }
    .btn:active { opacity: .7; }
    .btn-primary {
      background: var(--tg-btn);
      color: var(--tg-btn-text);
    }
    .btn-ton {
      background: #0098EA;
      color: #fff;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 8px;
    }
    .btn-ton:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    .btn-disconnect {
      background: transparent;
      color: var(--tg-hint);
      font-size: 12px;
      padding: 6px 10px;
      border: 1px solid var(--tg-hint);
      border-radius: 8px;
    }
    .settlement-card .settle-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 100;
      opacity: 0;
      transition: opacity .3s;
    }
    .toast.visible { opacity: 1; }
  </style>
</head>
<body>

  <!-- Wallet bar -->
  <div id="wallet-bar" class="wallet-bar" style="display:none">
    <div class="wallet-info">
      <span id="wallet-label">Not connected</span><br/>
      <span id="wallet-addr" class="wallet-addr"></span>
    </div>
    <button id="wallet-btn" class="btn btn-primary" onclick="toggleWallet()">Connect Wallet</button>
  </div>

  <!-- Tab bar -->
  <div class="tabs">
    <div class="tab active" data-panel="balances">Balances</div>
    <div class="tab" data-panel="expenses">Expenses</div>
  </div>

  <!-- Balances panel -->
  <div id="balances" class="panel active">
    <div id="balances-content">
      <div class="loader"></div>
    </div>
  </div>

  <!-- Expenses panel -->
  <div id="expenses" class="panel">
    <div id="expenses-content">
      <div class="loader"></div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
